<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkulima Direct | Submit Complaint</title>
    <style>
        :root {
            --bg: #f3f6f8;
            --card: #ffffff;
            --text: #142033;
            --muted: #5f6b7a;
            --primary: #0b7a5a;
            --primary-hover: #086247;
            --border: #d7dfe7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 20%, #e6fff5 0%, var(--bg) 45%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: var(--text);
            padding: 24px;
        }

        .complaint-card {
            width: min(100%, 640px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(16, 24, 40, 0.08);
            padding: 24px;
        }

        h2 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        .hint {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        button {
            border: none;
            background: var(--primary);
            color: #fff;
            padding: 11px 20px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .back-button {
            margin-top: 10px;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text);
        }

        .back-button:hover {
            background: #f5f8fa;
        }
    </style>
</head>
<body>
    <div class="complaint-card">
        <h2>Submit a Complaint</h2>
        <p class="hint">Share your issue and our support team will follow up.</p>
        <form id="complaintForm">
            <input type="text" id="subject" placeholder="Subject" required><br>
            <textarea id="description" placeholder="Describe your issue..." required></textarea><br>
            <button type="button" onclick="submitComplaint()">Submit</button>
        </form>
        <button type="button" class="back-button" onclick="goBack()">Go Back</button>
    </div>

    <script>
    async function submitComplaint() {
        const currentFarmer = localStorage.getItem('currentFarmer');
        const currentBuyer = localStorage.getItem('currentBuyer');

        const data = {
            userName: currentFarmer || currentBuyer,
            userRole: currentFarmer ? 'farmer' : 'buyer',
            subject: document.getElementById('subject').value,
            description: document.getElementById('description').value
        };

        if (!data.userName) {
            alert('Could not identify your account. Please log in again.');
            return;
        }

        try {
            const response = await fetch('http://localhost:5000/api/complaints', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('Complaint submitted. Our support team will contact you.');
                document.getElementById('complaintForm').reset();
                return;
            }

            const payload = await response.json().catch(() => ({}));
            alert(payload.error || 'Failed to submit complaint. Please try again.');
        } catch (_error) {
            alert('Network error. Please make sure the backend is running.');
        }
    }

    function goBack() {
        if (window.history.length > 1) {
            window.history.back();
            return;
        }
        window.location.href = 'index.html';
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkulima Direct | Login</title>
    <style>
        :root {
            --primary-color: #2E8B57; 
            --bg-color: #f9f9f9;
            --text-dark: #333333;
            --text-light: #ffffff;
            --border-color: #ccc;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: var(--text-light);
            padding: 40px;
            border: 1px solid var(--border-color); /* Simple border instead of shadow */
            border-radius: 4px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 { 
            color: var(--primary-color); 
            margin-top: 0; 
        }

        p {
            color: #666;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover { 
            opacity: 0.9; 
        }

        .link-btn {
            width: auto;
            margin-top: 10px;
            padding: 0;
            background: none;
            color: var(--primary-color);
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
        }

        .link-btn:disabled {
            color: #8aa998;
            cursor: not-allowed;
            text-decoration: none;
        }

        #error-message {
            color: #d9534f;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none; 
        }

        #otpSection {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            text-align: left;
        }

        #otpSection h3 {
            margin: 0 0 8px;
            color: var(--primary-color);
            font-size: 1rem;
        }

        #otpSection p {
            margin: 0 0 10px;
        }

        #otpStatus {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #666;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Welcome Back!</h2>
        <p style="margin-bottom: 25px;">Log in to manage your marketplace.</p>
        
        <form id="loginForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit">Proceed</button>
            
            <p id="error-message">Invalid name or password.</p>
        </form>

        <div id="otpSection">
            <h3>Security Verification</h3>
            <p>An email with a 6-digit code has been sent to your registered address.</p>
            <input type="text" id="loginOtp" placeholder="Enter Verification Code" maxlength="6">
            <button type="button" id="verifyOtpBtn">Verify &amp; Login</button>
            <button type="button" id="resendOtpBtn" class="link-btn">Send another verification code</button>
            <p id="otpStatus"></p>
        </div>

        <div class="links">
            <p>New to Mkulima Direct? <a href="register.html">Sign Up here</a>.</p>
            <p><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('error-message');
        const otpSection = document.getElementById('otpSection');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const resendOtpBtn = document.getElementById('resendOtpBtn');
        const otpStatus = document.getElementById('otpStatus');

        // Global variable to keep track of the email during the 2-step process
        let currentLoginEmail = '';
        let currentLoginName = '';
        let currentLoginPassword = '';
        let resendCooldownTimer = null;
        const RESEND_COOLDOWN_SECONDS = 30;

        loginForm.addEventListener('submit', handleLogin);
        verifyOtpBtn.addEventListener('click', verifyLoginOtp);
        resendOtpBtn.addEventListener('click', resendLoginOtp);

        function setOtpStatus(message, isError = false) {
            otpStatus.textContent = message;
            otpStatus.style.color = isError ? '#d9534f' : '#666';
        }

        function startResendCooldown(seconds = RESEND_COOLDOWN_SECONDS) {
            let remaining = seconds;
            resendOtpBtn.disabled = true;
            resendOtpBtn.textContent = `Resend available in ${remaining}s`;

            if (resendCooldownTimer) {
                clearInterval(resendCooldownTimer);
            }

            resendCooldownTimer = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(resendCooldownTimer);
                    resendCooldownTimer = null;
                    resendOtpBtn.disabled = false;
                    resendOtpBtn.textContent = 'Send another verification code';
                    return;
                }
                resendOtpBtn.textContent = `Resend available in ${remaining}s`;
            }, 1000);
        }

        async function requestLoginOtp(name, password) {
            const response = await fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, password })
            });

            const result = await response.json();
            if (!response.ok) {
                throw new Error(result.error || 'Could not send verification code.');
            }

            if (!result.requireOtp || !result.email) {
                throw new Error('Login flow error: verification step was not initialized.');
            }

            return result;
        }

        async function handleLogin(event) {
            event.preventDefault();

            localStorage.removeItem('sessionToken');
            localStorage.removeItem('currentFarmer');
            localStorage.removeItem('currentBuyer');
            localStorage.removeItem('currentRole');
            localStorage.removeItem('currentUserName');
            localStorage.removeItem('isAdmin');

            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;

            currentLoginName = name;
            currentLoginPassword = password;

            errorMessage.style.display = 'none';

            try {
                // Admin login path: username/password check directly on backend.
                const adminLoginResponse = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: name, password })
                });

                const adminLoginResult = await adminLoginResponse.json();
                if (adminLoginResponse.ok && adminLoginResult.role === 'admin') {
                    localStorage.setItem('isAdmin', 'true');
                    localStorage.setItem('adminApiKey', adminLoginResult.adminKey || 'SECURE-ADMIN-KEY-2026');
                    localStorage.setItem('currentRole', 'admin');
                    localStorage.setItem('currentUserName', 'admin');
                    window.location.href = '../admin/dashboard.html';
                    return;
                }

                // STEP 1: Verify Password and Trigger Email
                const result = await requestLoginOtp(name, password);

                // STEP 2: If backend requires OTP, swap the forms seamlessly
                if (result.requireOtp) {
                    currentLoginEmail = result.email; // Save email for the next step

                    // Hide the password form and show the OTP input block
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'block';
                    setOtpStatus('Verification code sent. Check your email inbox.');
                    startResendCooldown();
                }

            } catch (error) {
                console.error('Login Error:', error);
                alert(error.message || 'Could not connect to the server.');
            }
        }

        async function resendLoginOtp() {
            if (resendOtpBtn.disabled) return;

            if (!currentLoginName || !currentLoginPassword) {
                setOtpStatus('Please restart login to request another code.', true);
                return;
            }

            try {
                resendOtpBtn.disabled = true;
                resendOtpBtn.textContent = 'Sending...';
                setOtpStatus('Requesting a new verification code...');

                const result = await requestLoginOtp(currentLoginName, currentLoginPassword);
                currentLoginEmail = result.email;
                setOtpStatus('New verification code sent. Please check your email.');
                startResendCooldown();
            } catch (error) {
                console.error('Resend OTP Error:', error);
                setOtpStatus(error.message || 'Failed to resend verification code.', true);
                resendOtpBtn.disabled = false;
                resendOtpBtn.textContent = 'Send another verification code';
            }
        }

        async function verifyLoginOtp() {
            const userCode = document.getElementById('loginOtp').value;
            const name = document.getElementById('name').value;

            if (!userCode || userCode.length !== 6) {
                alert('Please enter a valid 6-digit code.');
                return;
            }

            try {
                // STEP 3: Send the code back to Python to complete the login
                const verifyResponse = await fetch('http://localhost:5000/api/login/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentLoginEmail, code: userCode })
                });

                const verifyResult = await verifyResponse.json();

                if (!verifyResponse.ok) {
                    alert(verifyResult.error);
                    return;
                }

                // LOGIN SUCCESSFUL! Save identity details and route to dashboard
                localStorage.setItem('sessionToken', verifyResult.token || '');
                localStorage.setItem('currentUserName', verifyResult.userName || name);
                localStorage.setItem('currentRole', verifyResult.role || '');

                if (verifyResult.role === 'farmer') {
                    localStorage.setItem('currentFarmer', verifyResult.userName || name);
                    localStorage.removeItem('currentBuyer');
                } else {
                    localStorage.setItem('currentBuyer', verifyResult.userName || name);
                    localStorage.removeItem('currentFarmer');
                }

                if (verifyResult.role === 'farmer') {
                    window.location.href = '../farmer/dashboard.html';
                } else {
                    window.location.href = '../buyer/dashboard.html';
                }

            } catch (error) {
                console.error('Verification Error:', error);
                alert('Verification failed. Please try again.');
            }
        }
    </script>

</body>
</html>

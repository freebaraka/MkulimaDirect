<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkulima Direct | Login</title>
    <style>
        :root {
            --primary-color: #2E8B57;
            --secondary-color: #1E5631;
            --bg-color: #f4f9f4;
            --text-dark: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }
        h2 { color: var(--secondary-color); margin-top: 0; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }
        button:hover { background-color: var(--secondary-color); }
        .links { margin-top: 20px; font-size: 0.9rem; }
        .links a { color: var(--primary-color); text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        
        /* New style for the error message */
        #error-message {
            color: #d9534f;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Welcome Back! 🚜</h2>
        <p style="color: #666; margin-bottom: 25px;">Log in to manage your marketplace.</p>
        
        <form id="loginForm">
            <input type="text" id="phone" placeholder="Phone Number" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit">Log In</button>
            
            <p id="error-message">Invalid phone number or password.</p>
        </form>

        <div class="links">
            <p>New to Mkulima Direct? <a href="register.html">Sign Up here</a>.</p>
            <p><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        // Grab the form element from the page
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('error-message');

        // Listen for when the user clicks the Log In button
        loginForm.addEventListener('submit', function(event) {
            // Prevent the form from refreshing the page immediately
            event.preventDefault();

            // Get what the user typed in
            const phoneValue = document.getElementById('phone').value;
            const passwordValue = document.getElementById('password').value;

            // 1. Check if it is the Farmer
            if (phoneValue === '1234' && passwordValue === 'abcd') {
                // Redirect to the farmer dashboard
                window.location.href = '../farmer/dashboard.html';
            } 
            // 2. Check if it is the Buyer
            else if (phoneValue === '6789' && passwordValue === 'wxyz') {
                // Redirect to the buyer dashboard
                window.location.href = '../buyer/dashboard.html';
            } 
            // 3. If neither match, show the error message
            else {
                errorMessage.style.display = 'block';
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkulima Direct | Login</title>
    <style>
        :root {
            --primary-color: #2E8B57; 
            --bg-color: #f9f9f9;
            --text-dark: #333333;
            --text-light: #ffffff;
            --border-color: #ccc;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: var(--text-light);
            padding: 40px;
            border: 1px solid var(--border-color); /* Simple border instead of shadow */
            border-radius: 4px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 { 
            color: var(--primary-color); 
            margin-top: 0; 
        }

        p {
            color: #666;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover { 
            opacity: 0.9; 
        }

        #error-message {
            color: #d9534f;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none; 
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Welcome Back!</h2>
        <p style="margin-bottom: 25px;">Log in to manage your marketplace.</p>
        
        <form id="loginForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit">Log In</button>
            
            <p id="error-message">Invalid name or password.</p>
        </form>

        <div class="links">
            <p>New to Mkulima Direct? <a href="register.html">Sign Up here</a>.</p>
            <p><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault(); 

            // Extract the name instead of the phone number
            const nameValue = document.getElementById('name').value;
            const passwordValue = document.getElementById('password').value;

            errorMessage.style.display = 'none';

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: nameValue, // Sending the name to the backend
                        password: passwordValue
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    if (result.role === 'farmer') {
                        window.location.href = '../farmer/dashboard.html';
                    } else if (result.role === 'buyer') {
                        window.location.href = '../buyer/dashboard.html';
                    }
                } else {
                    errorMessage.textContent = result.error;
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = 'Cannot connect to the server. Is it running?';
                errorMessage.style.display = 'block';
            }
        });
    </script>

</body>
</html>

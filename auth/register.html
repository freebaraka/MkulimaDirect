<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkulima Direct | Register</title>
    <style>
        /* Minimal Color Palette */
        :root {
            --primary-color: #2E8B57; /* SeaGreen */
            --bg-color: #f9f9f9;
            --text-dark: #333333;
            --text-light: #ffffff;
            --border-color: #ccc;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: var(--text-light);
            padding: 40px;
            border: 1px solid var(--border-color); /* Simple border instead of shadow */
            border-radius: 4px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 { 
            color: var(--primary-color); 
            margin-top: 0; 
        }

        p {
            color: #666;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover { 
            opacity: 0.9; 
        }

        
        
        #status-message {
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Create an Account</h2>
        <p style="margin-bottom: 25px;">Join the Mkulima Direct community.</p>
        
        <form id="registerForm">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="text" id="phone" placeholder="Phone Number" required>
            
            <select id="role" required>
                <option value="" disabled selected>Select your role...</option>
                <option value="farmer">I am a Farmer</option>
                <option value="buyer">I am a Buyer</option>
            </select>

            <input type="password" id="password" placeholder="Create Password" required>
            
            <button type="submit">Sign Up</button>
        </form>

        <div id="status-message"></div>

        <div class="links">
            <p>Already have an account? <a href="login.html">Log In here</a>.</p>
            <p><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const statusMessage = document.getElementById('status-message');

        registerForm.addEventListener('submit', async function(event) {
            event.preventDefault(); // Stop the page from reloading

            // 1. Gather the data from the form
            const userData = {
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                password: document.getElementById('password').value
            };

            // 2. Show a loading message
            statusMessage.style.display = 'block';
            statusMessage.className = '';
            statusMessage.textContent = 'Creating account...';

            try {
                // 3. Send the data to your Python Flask API
                const response = await fetch('http://localhost:5000/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                // 4. Handle the response
                if (response.ok) {
                    statusMessage.className = 'success';
                    statusMessage.textContent = 'Registration successful! Redirecting...';
                    
                    // Clear the form
                    registerForm.reset();
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    // Show error from the server (e.g., "Phone number already registered")
                    statusMessage.className = 'error';
                    statusMessage.textContent = result.error || 'Registration failed.';
                }
            } catch (error) {
                console.error('Error:', error);
                statusMessage.className = 'error';
                statusMessage.textContent = 'Cannot connect to the server. Is your Python API running?';
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkulima Direct | Register</title>
    <style>
        /* Minimal Color Palette */
        :root {
            --primary-color: #2E8B57; /* SeaGreen */
            --bg-color: #f9f9f9;
            --text-dark: #333333;
            --text-light: #ffffff;
            --border-color: #ccc;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: var(--text-light);
            padding: 40px;
            border: 1px solid var(--border-color); /* Simple border instead of shadow */
            border-radius: 4px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 { 
            color: var(--primary-color); 
            margin-top: 0; 
        }

        p {
            color: #666;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover { 
            opacity: 0.9; 
        }

        
        
        #status-message {
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
            border-radius: 4px;
        }

        .email-heads-up {
            margin: 6px 0 2px;
            padding: 8px 10px;
            border: 1px solid #f0d98a;
            background: #fff8df;
            color: #6b4f00;
            font-size: 0.85rem;
            text-align: left;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Create an Account</h2>
        <p style="margin-bottom: 25px;">Join the Mkulima Direct community.</p>
        
        <form id="registerForm">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="text" id="location" placeholder="Location" required>
            <p class="email-heads-up">Heads up: every user must have an active email address to receive the verification code.</p>
            <input type="email" id="email" placeholder="Email Address" required>
            
            <select id="role" required>
                <option value="" disabled selected>Select your role...</option>
                <option value="farmer">I am a Farmer</option>
                <option value="buyer">I am a Buyer</option>
            </select>

            <input type="password" id="password" placeholder="Create Password" required>
            
            <button type="submit">Sign Up</button>
        </form>

        <div id="status-message"></div>

        <div class="links">
            <p>Already have an account? <a href="login.html">Log In here</a>.</p>
            <p><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const statusMessage = document.getElementById('status-message');

        registerForm.addEventListener('submit', handleSignup);

        async function handleSignup(event) {
            event.preventDefault();

            // Gather your form data
            const formData = {
                fullName: document.getElementById('fullName').value,
                location: document.getElementById('location').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
                password: document.getElementById('password').value
            };

            statusMessage.style.display = 'block';
            statusMessage.className = '';
            statusMessage.textContent = 'Sending verification code...';

            try {
                // 1. Ask Python to validate and send the email
                const response = await fetch('http://localhost:5000/api/signup/request_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (!response.ok) {
                    statusMessage.className = 'error';
                    statusMessage.textContent = result.error || 'Failed to send verification code.';
                    alert(result.error || 'Failed to send verification code.');
                    return;
                }

                // 2. If email sent, prompt the user for the 6 digits
                const userCode = prompt('Enter the 6-digit code sent to your email:');
                if (!userCode) {
                    statusMessage.className = 'error';
                    statusMessage.textContent = 'Verification cancelled.';
                    return;
                }

                statusMessage.className = '';
                statusMessage.textContent = 'Verifying code...';

                // 3. Send the code back to Python to finish creating the account
                const verifyResponse = await fetch('http://localhost:5000/api/signup/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: formData.email, code: userCode, role: formData.role })
                });

                const verifyResult = await verifyResponse.json();
                alert(verifyResult.message || verifyResult.error);

                if (verifyResponse.ok) {
                    statusMessage.className = 'success';
                    statusMessage.textContent = 'Account verified and created successfully! Redirecting...';
                    registerForm.reset();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    statusMessage.className = 'error';
                    statusMessage.textContent = verifyResult.error || 'Verification failed.';
                }
            } catch (error) {
                console.error('Error:', error);
                statusMessage.className = 'error';
                statusMessage.textContent = 'Cannot connect to the server. Is your Python API running?';
            }
        }
    </script>

</body>
</html>

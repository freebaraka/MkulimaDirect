<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard | Mkulima Direct</title>
    <style>
        :root {
            --primary-color: #2E8B57; 
            --bg-color: #ffffff;
            --sidebar-bg: #f9f9f9;
            --text-dark: #333333;
            --border-color: #e0e0e0;
            --sidebar-width: 250px;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .sidebar h2 { 
            text-align: center; 
            color: var(--primary-color); 
            margin-bottom: 30px; 
            font-size: 1.3rem;
        }

        .sidebar a {
            text-decoration: none;
            color: var(--text-dark);
            padding: 15px 25px;
            font-weight: bold;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #eeeeee;
            border-left-color: var(--primary-color);
            color: var(--primary-color);
        }

        .logout { margin-top: auto; margin-bottom: 20px; color: #d9534f !important; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;
        }

        .header h1 { margin: 0; color: var(--primary-color); font-size: 1.8rem; }
        .header input { padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); width: 300px; }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: #ffffff;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: left;
        }

        .product-card h3 { margin: 0 0 10px 0; color: var(--primary-color); font-size: 1.2rem; }
        .product-card p { color: #555; margin: 5px 0; font-size: 0.95rem; }
        .product-card .price { font-weight: bold; color: var(--text-dark); margin-bottom: 15px; display: block; }

        .product-card button {
            width: 100%;
            padding: 10px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .product-card button:hover { opacity: 0.9; }
        
        .loading { text-align: center; color: #666; font-size: 1.1rem; padding: 40px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Buyer Panel</h2>
        <a href="dashboard.html" class="active">Marketplace</a>
        <a href="cart.html">My Cart (<span id="cart-count">0</span>)</a>
        <a href="order-history.html">Order History</a>
        <a href="../index.html" class="logout">Log Out</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Fresh Market</h1>
            <input type="text" placeholder="Search for crops...">
        </div>

        <h2 style="margin-top: 0; font-size: 1.4rem; color: #333;">Featured Produce</h2>
        
        <div class="market-grid" id="market-grid">
            <div class="loading">Loading fresh produce from the database... ⏳</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const marketGrid = document.getElementById('market-grid');

            try {
                // Fetch the live produce data from Python
                const response = await fetch('http://localhost:5000/api/produce');
                const produceList = await response.json();

                // Clear the "Loading" message
                marketGrid.innerHTML = '';

                if (produceList.length === 0) {
                    marketGrid.innerHTML = '<div class="loading">No produce available right now. Check back later!</div>';
                    return;
                }

                // Loop through every item and build an HTML card for it
                produceList.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'product-card';

                    // Show rating if reviews exist, otherwise mark as a new farmer
                    const ratingDisplay = item.reviews > 0
                        ? `★ ${item.rating}/5 (${item.reviews})`
                        : 'New Farmer';
                    
                    card.innerHTML = `
                        <h3>${item.name}</h3>
                        <p>${item.description || ''}</p>
                        <span class="price">KSh ${item.price} / ${item.unit}</span>
                        <p><strong>Stock:</strong> ${item.stock} ${item.unit}s</p>
                        <p><strong>Farmer:</strong> ${item.farmerName}<br><span style="color: #666; font-size: 0.9rem;">${ratingDisplay}</span></p>
                        <p><strong>Location:</strong> ${item.location}</p>
                        <p><strong>Phone:</strong> ${item.phone}</p>
                        <button onclick="addToCart(${item.id})">Add to Cart</button>
                    `;
                    
                    // Add the finished card to the screen
                    marketGrid.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching produce:', error);
                marketGrid.innerHTML = '<div class="loading" style="color: red;">Failed to connect to the server.</div>';
            }
        });
        // Function to actually send the item to the database cart
        async function addToCart(produceId) {
            // Use the buyer name saved at login so we don't repeatedly prompt on every click
            const buyerName = localStorage.getItem('currentBuyer');

            if (!buyerName) {
                alert("Session expired. Please log in again.");
                window.location.href = '../auth/login.html';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        buyerName: buyerName,
                        produceId: produceId
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Success! " + result.message);
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert("Cannot connect to the server.");
            }
        }
    </script>

</body>
</html>

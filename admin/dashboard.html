<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Mkulima Direct</title>
    <style>
        :root {
            --primary-color: #2E8B57; 
            --bg-color: #ffffff;
            --sidebar-bg: #f4f4f4;
            --text-dark: #333333;
            --border-color: #cccccc;
            --sidebar-width: 250px;
        }

        body {
            margin: 0; font-family: Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-dark);
            display: flex; height: 100vh;
        }

        /* Ultra-Flat Sidebar */
        .sidebar {
            width: var(--sidebar-width); background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color); display: flex;
            flex-direction: column; padding-top: 20px;
        }
        .sidebar h2 { text-align: center; color: var(--text-dark); margin-bottom: 30px; font-size: 1.2rem; letter-spacing: 1px; }
        .sidebar a {
            text-decoration: none; color: var(--text-dark); padding: 15px 25px;
            font-size: 0.95rem; border-left: 4px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #e9e9e9; border-left-color: var(--primary-color); font-weight: bold;
        }
        .logout { margin-top: 12px; margin-bottom: 20px; color: #d9534f !important; }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;
        }
        .header h1 { margin: 0; font-size: 1.6rem; font-weight: normal; }

        /* Minimalist Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-box {
            padding: 20px; border: 1px solid var(--border-color); 
            background: #ffffff; text-align: left;
        }
        .stat-box h3 { margin: 0; font-size: 2rem; color: var(--text-dark); font-weight: normal; }
        .stat-box p { margin: 5px 0 0; color: #666; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }

        #data-table {
            border: 1px solid #cccccc;
            text-align: left;
        }
        #data-table th {
            background-color: #f4f4f4;
            padding: 12px;
            font-size: 0.9rem;
        }
        #data-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }
        .action-btn {
            border: 1px solid #cccccc;
            background: #ffffff;
            color: #333333;
            padding: 6px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-right: 6px;
        }
        .action-btn:hover {
            background: #f4f4f4;
        }
        .action-btn.delete {
            color: #b94a48;
            border-color: #e2c3c3;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SYSTEM ADMIN</h2>
        <a href="#" onclick="showView('overview')" id="nav-overview" class="active">Overview</a>
        <a href="#" onclick="showView('farmers')" id="nav-farmers">Manage Farmers</a>
        <a href="#" onclick="showView('buyers')" id="nav-buyers">Manage Buyers</a>
        <a href="#" onclick="showView('orders')" id="nav-orders">Platform Orders</a>
        <a href="#" onclick="showView('payments')" id="nav-payments">Payment Records</a>
        <a href="#" onclick="showView('ratings')" id="nav-ratings">Farmer Ratings</a>
        <a href="#" onclick="showView('audit')" id="nav-audit">System Audit Logs</a>
        <a href="#" onclick="showView('complaints')" id="nav-complaints">View Complaints</a>
        <a href="../index.html" class="logout">Secure Log Out</a>
    </div>

    <div class="main-content" id="main-content">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            showView('overview');
        });

        async function showView(view) {
            // 1. Update active class
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${view}`).classList.add('active');

            const content = document.getElementById('main-content');
            
            // IF OVERVIEW: Put the original HTML structure back
            if (view === 'overview') {
                content.innerHTML = `
                    <div class="header"><h1>Platform Overview</h1></div>
                    <div class="stats-grid">
                        <div class="stat-box"><h3 id="admin-users">...</h3><p>Total Registered Users</p>
                        <div id="users-breakdown" style="font-size: 0.8rem; color: #2E8B57; font-weight: bold; margin-top: 5px;"></div></div>
                        <div class="stat-box"><h3 id="admin-produce">...</h3><p>Active Produce Listings</p></div>
                    </div>
                    <div style="border: 1px solid #cccccc; padding: 20px; background: #ffffff;">
                        <h2 style="margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #cccccc; padding-bottom: 10px;">Recent System Activity</h2>
                        <div id="activity-feed"><p style="color: #666; font-size: 0.9rem;">Fetching logs...</p></div>
                    </div>
                `;
                // Re-run the original fetch logic
                fetchDashboardData();
                return;
            }

            // Orders uses custom headers and API mapping for the admin table.
            if (view === 'orders') {
                try {
                    content.innerHTML = `<h1>PLATFORM ORDERS</h1><table id="data-table" border="1" width="100%" style="border-collapse: collapse; margin-top: 20px;"></table>`;
                    const table = document.getElementById('data-table');
                    
                    // Fetch data from your new /api/orders route
                    const response = await fetch('http://localhost:5000/api/orders');
                    const data = await response.json();

                    // CUSTOM HEADERS for Orders
                    let html = '<tr><th>Buyer Name</th><th>Order Details</th><th>Status</th></tr>';
                    
                    data.forEach(item => {
                        html += `
                            <tr>
                                <td>${item.fullName}</td>
                                <td>${item.email}</td> <td>${item.joinedDate}</td> </tr>`;
                    });
                    table.innerHTML = html;
                } catch (e) {
                    content.innerHTML += '<p style="color:red;">Error loading orders data.</p>';
                }
                return;
            }

            if (view === 'payments') {
                content.innerHTML = `<h1>PAYMENT RECORDS</h1><table id="data-table" border="1" width="100%" style="border-collapse: collapse; margin-top: 20px;"></table>`;
                const table = document.getElementById('data-table');

                try {
                    const response = await fetch('http://localhost:5000/api/admin/payments');
                    const data = await response.json();

                    let html = '<tr><th>Order ID</th><th>Buyer</th><th>Amount (KSh)</th><th>Date</th><th>Status</th></tr>';
                    data.forEach(item => {
                        html += `<tr>
                            <td>#${item.orderId}</td>
                            <td>${item.buyerName}</td>
                            <td>${item.amount}</td>
                            <td>${item.date}</td>
                            <td><span style="color: ${item.status === 'Completed' ? 'green' : 'orange'}; font-weight:bold;">${item.status}</span></td>
                        </tr>`;
                    });
                    table.innerHTML = html;
                } catch (e) {
                    content.innerHTML = `<p style="color:red;">Error loading payment records.</p>`;
                }
                return;
            }

            if (view === 'complaints') {
                content.innerHTML = `<h1>USER COMPLAINTS</h1><table id="data-table" border="1" width="100%" style="border-collapse: collapse; margin-top: 20px;"></table>`;
                const table = document.getElementById('data-table');

                try {
                    const response = await fetch('http://localhost:5000/api/admin/complaints');
                    const data = await response.json();

                    let html = '<tr><th>User</th><th>Role</th><th>Subject</th><th>Description</th><th>Status</th></tr>';
                    data.forEach(item => {
                        html += `<tr>
                            <td>${item.userName}</td>
                            <td>${item.userRole}</td>
                            <td>${item.subject}</td>
                            <td>${item.description}</td>
                            <td>${item.status}</td>
                        </tr>`;
                    });
                    table.innerHTML = html;
                } catch (e) {
                    content.innerHTML += `<p style="color:red;">Error loading complaints.</p>`;
                }
                return;
            }

            if (view === 'ratings') {
                content.innerHTML = `<h1>FARMER RATINGS</h1><table id="data-table" border="1" width="100%" style="border-collapse: collapse; margin-top: 20px;"></table>`;
                const table = document.getElementById('data-table');

                try {
                    const response = await fetch('http://localhost:5000/api/admin/ratings');
                    const data = await response.json();

                    // Header for Ratings Table
                    let html = '<tr><th>Farmer Name</th><th>Buyer Name</th><th>Rating (1-5)</th><th>Date</th></tr>';

                    data.forEach(item => {
                        html += `<tr>
                            <td>${item.farmerName}</td>
                            <td>${item.buyerName}</td>
                            <td>${item.ratingValue} / 5</td>
                            <td>${item.date}</td>
                        </tr>`;
                    });
                    table.innerHTML = html;
                } catch (e) {
                    content.innerHTML += `<p style="color:red;">Error loading ratings.</p>`;
                }
                return;
            }

            if (view === 'audit') {
                content.innerHTML = `<h1>SYSTEM AUDIT LOGS</h1><table id="data-table" border="1" width="100%" style="border-collapse: collapse; margin-top: 20px;"></table>`;
                const table = document.getElementById('data-table');

                try {
                    const response = await fetch('http://localhost:5000/api/admin/audit');
                    const logs = await response.json();

                    let html = '<tr><th>User</th><th>Role</th><th>Login Time</th><th>Logout Time</th><th>Duration (min)</th></tr>';
                    logs.forEach(log => {
                        html += `<tr>
                            <td>${log.userName}</td>
                            <td>${log.userRole}</td>
                            <td>${log.login}</td>
                            <td>${log.logout || 'Active'}</td>
                            <td>${log.duration}</td>
                        </tr>`;
                    });
                    table.innerHTML = html;
                } catch (e) {
                    content.innerHTML += `<p style="color:red;">Error loading audit logs.</p>`;
                }
                return;
            }

            content.innerHTML = `<h1>${view.toUpperCase()}</h1><table id="data-table" border="1" width="100%" style="border-collapse: collapse; margin-top: 20px;"></table>`;
            
            // 2. Fetch specific data
            const table = document.getElementById('data-table');
            try {
                let endpoint = view === 'farmers' ? '/api/farmers' : '/api/buyers';
                const response = await fetch(`http://localhost:5000${endpoint}`);
                const data = await response.json();

                // 3. Render Table
                let html = '<tr><th>Name</th><th>Email</th><th>Location</th><th>Joined</th><th>Actions</th></tr>';
                data.forEach(item => {
                    html += `
                        <tr>
                            <td>${item.fullName}</td>
                            <td>${item.email}</td>
                            <td>${item.location || 'Not set'}</td>
                            <td>${item.joinedDate}</td>
                            <td>
                                <button class="action-btn js-edit-user"
                                    data-view="${view}"
                                    data-user-id="${item.userId}"
                                    data-full-name="${escapeHtml(item.fullName)}"
                                    data-email="${escapeHtml(item.email)}"
                                    data-location="${escapeHtml(item.location || '')}">Edit</button>
                                <button class="action-btn delete js-delete-user"
                                    data-view="${view}"
                                    data-user-id="${item.userId}"
                                    data-full-name="${escapeHtml(item.fullName)}">Delete</button>
                            </td>
                        </tr>`;
                });
                table.innerHTML = html;

                document.querySelectorAll('.js-edit-user').forEach(btn => {
                    btn.addEventListener('click', () => {
                        editUser(
                            btn.dataset.view,
                            Number(btn.dataset.userId),
                            btn.dataset.fullName,
                            btn.dataset.email,
                            btn.dataset.location
                        );
                    });
                });

                document.querySelectorAll('.js-delete-user').forEach(btn => {
                    btn.addEventListener('click', () => {
                        deleteUser(
                            btn.dataset.view,
                            Number(btn.dataset.userId),
                            btn.dataset.fullName
                        );
                    });
                });
            } catch(e) {
                content.innerHTML += `<p style="color:red;">Error loading ${view} data.</p>`;
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        async function editUser(view, userId, currentName, currentEmail, currentLocation) {
            const newName = prompt('Edit full name:', currentName);
            if (newName === null) {
                return;
            }

            const newEmail = prompt('Edit email:', currentEmail);
            if (newEmail === null) {
                return;
            }

            const locationLabel = view === 'farmers' ? 'Edit location:' : 'Edit delivery address:';
            const newLocation = prompt(locationLabel, currentLocation || '');
            if (newLocation === null) {
                return;
            }

            try {
                const role = view === 'farmers' ? 'farmer' : 'buyer';
                const response = await fetch(`http://localhost:5000/api/admin/users/${role}/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: newName.trim(),
                        email: newEmail.trim(),
                        location: newLocation.trim()
                    })
                });

                const result = await response.json();
                if (!response.ok) {
                    alert(result.error || 'Failed to update user.');
                    return;
                }

                alert('User updated successfully.');
                showView(view);
            } catch (e) {
                alert('Error updating user.');
            }
        }

        async function deleteUser(view, userId, fullName) {
            const confirmed = confirm(`Delete ${fullName}? This action cannot be undone.`);
            if (!confirmed) {
                return;
            }

            try {
                const role = view === 'farmers' ? 'farmer' : 'buyer';
                const response = await fetch(`http://localhost:5000/api/admin/users/${role}/${userId}`, {
                    method: 'DELETE'
                });

                const result = await response.json();
                if (!response.ok) {
                    alert(result.error || 'Failed to delete user.');
                    return;
                }

                alert('User deleted successfully.');
                showView(view);
            } catch (e) {
                alert('Error deleting user.');
            }
        }

        async function fetchDashboardData() {
            try {
                const response = await fetch('http://localhost:5000/api/admin/stats');
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('admin-users').textContent = data.totalUsers;
                    document.getElementById('admin-produce').textContent = data.totalProduce;
                    document.getElementById('users-breakdown').textContent = `${data.totalFarmers} Farmers | ${data.totalBuyers} Buyers`;

                    const feedContainer = document.getElementById('activity-feed');
                    if (!data.activities || data.activities.length === 0) {
                        feedContainer.innerHTML = '<p style="color: #666;">No recent activity found.</p>';
                    } else {
                        let feedHtml = '';
                        data.activities.forEach(log => {
                            feedHtml += `
                                <div style="padding: 12px 0; border-bottom: 1px solid #f0f0f0;">
                                    <span style="display: inline-block; width: 120px; font-weight: bold; color: #333; font-size: 0.9rem;">${log.type}</span>
                                    <span style="color: #555; font-size: 0.95rem;">${log.description}</span>
                                    <span style="float: right; color: #999; font-size: 0.8rem;">${log.time}</span>
                                </div>
                            `;
                        });
                        feedContainer.innerHTML = feedHtml;
                    }
                } else {
                    document.getElementById('activity-feed').innerHTML = `<p style="color: red;">${data.error}</p>`;
                }
            } catch (e) {
                console.error("Fetch error:", e);
                const feedContainer = document.getElementById('activity-feed');
                if (feedContainer) {
                    feedContainer.innerHTML = '<p style="color: red;">Failed to fetch dashboard metrics.</p>';
                }
            }
        }
    </script>

</body>
</html>

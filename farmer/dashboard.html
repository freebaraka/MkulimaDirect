<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard | Mkulima Direct</title>
    <style>
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        th { background-color: #f9f9f9; color: #666; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .status-pending { background-color: #fff3cd; color: #856404; }
        .status-delivered { background-color: #d4edda; color: #155724; }

        :root {
            --primary-color: #2E8B57; /* SeaGreen */
            --bg-color: #ffffff;
            --sidebar-bg: #f9f9f9;
            --text-dark: #333333;
            --border-color: #e0e0e0;
            --sidebar-width: 250px;
        }

        /* Basic Reset */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
        }

        /* Flat Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.3rem;
        }

        .sidebar a {
            text-decoration: none;
            color: var(--text-dark);
            padding: 15px 25px;
            font-weight: bold;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #eeeeee;
            border-left-color: var(--primary-color);
            color: var(--primary-color);
        }

        .sidebar a.support-link {
            color: var(--primary-color);
            font-weight: bold;
            background-color: #edf8f2;
            border-left-color: var(--primary-color);
            margin-top: auto;
        }

        .sidebar a.support-link:hover {
            background-color: #e0f1e9;
        }

        .logout { 
            margin-top: 12px; 
            margin-bottom: 20px; 
            color: #d9534f !important; 
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header h1 { 
            margin: 0; 
            color: var(--primary-color); 
            font-size: 1.8rem;
        }
        
        .header button {
            padding: 10px 20px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            font-weight: bold;
        }

        .header button:hover {
            opacity: 0.9;
        }
        
        /* Flat Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* Minimal Stat Card */
        .stat-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .stat-card h3 { 
            margin: 0; 
            font-size: 1.8rem; 
            color: var(--primary-color); 
        }

        .stat-card p { 
            margin: 5px 0 0; 
            color: #555; 
            font-size: 0.9rem; 
            font-weight: bold;
        }

        /* Recent Orders Section */
        .recent-orders {
            background: #ffffff; 
            padding: 20px; 
            border-radius: 4px; 
            border: 1px solid var(--border-color);
        }

        .recent-orders h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Farmer Panel</h2>
        <a href="dashboard.html" class="active">Dashboard Overview</a>
        <a href="my-produce.html">My Produce</a>
        <a href="orders.html">Orders &amp; Sales</a>
        <a href="../complaints.html" class="support-link">Need Help? Submit Complaint</a>
        <a href="../index.html" class="logout">Log Out</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1 id="farmer-greeting">Welcome back!</h1>
                <p id="farmer-rating">Rating: -- / 5.0</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="stat-earnings">Loading...</h3>
                <p>Total Earnings</p>
            </div>

            <div class="stat-card">
                <h3 id="stat-listings">-</h3>
                <p>Active Listings</p>
            </div>

            <div class="stat-card">
                <h3 id="stat-orders">-</h3>
                <p>Pending Orders</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const farmerName = prompt("Please confirm your registered Farmer Name to view your dashboard:");
            if (!farmerName) return;

            // Save to localStorage so they don't have to type it again when switching tabs!
            localStorage.setItem('currentFarmer', farmerName);
            document.getElementById('farmer-greeting').textContent = `Welcome back, ${farmerName}!`;

            try {
                const response = await fetch(`http://localhost:5000/api/farmer/stats/${farmerName}`);
                const stats = await response.json();
                if (response.ok) {
                    document.getElementById('stat-earnings').textContent = `KSh ${stats.totalEarnings.toLocaleString()}`;
                    document.getElementById('stat-listings').textContent = stats.activeListings;
                    document.getElementById('stat-orders').textContent = stats.pendingOrders;
                    document.getElementById('farmer-rating').textContent = stats.totalReviews === 0
                        ? "Rating: No reviews yet"
                        : `Rating: ${stats.averageRating} / 5.0 (${stats.totalReviews} Reviews)`;
                }
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>

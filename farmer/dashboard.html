<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard | Mkulima Direct</title>
    <style>
        :root {
            --primary-color: #2E8B57;
            --secondary-color: #1E5631;
            --bg-color: #f4f9f4;
            --text-dark: #333333;
            --sidebar-width: 250px;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
        }
        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }
        .sidebar h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .sidebar a {
            text-decoration: none;
            color: var(--text-dark);
            padding: 15px 25px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
            border-left: 4px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #eaf3ea;
            border-left-color: var(--primary-color);
            color: var(--primary-color);
        }
        .logout { margin-top: auto; margin-bottom: 20px; color: #d9534f !important; }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--secondary-color); }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 4px solid var(--primary-color);
        }
        .stat-card h3 { margin: 0; font-size: 2rem; color: var(--text-dark); }
        .stat-card p { margin: 5px 0 0; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>👨🏽‍🌾 Farmer Panel</h2>
        <a href="dashboard.html" class="active">Dashboard Overview</a>
        <a href="#">My Produce</a>
        <a href="#">Add New Listing</a>
        <a href="#">Orders & Sales</a>
        <a href="#">Account Settings</a>
        <a href="../index.html" class="logout">🚪 Log Out</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Welcome back, John!</h1>
            <button style="padding: 10px 20px; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer;">+ Add New Produce</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>KSh 45,000</h3>
                <p>Total Earnings</p>
            </div>
            <div class="stat-card">
                <h3>12</h3>
                <p>Active Listings</p>
            </div>
            <div class="stat-card">
                <h3>4</h3>
                <p>Pending Orders</p>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <h2 style="margin-top: 0;">Recent Orders</h2>
            <p style="color: #666;">You have 4 orders waiting to be shipped.</p>
            </div>
    </div>

</body>
</html>

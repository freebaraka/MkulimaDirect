<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Produce | Mkulima Direct</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        th { background-color: #f9f9f9; color: #666; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .status-pending { background-color: #fff3cd; color: #856404; }
        .status-delivered { background-color: #d4edda; color: #155724; }

        :root {
            --primary-color: #2E8B57;
            --bg-color: #ffffff;
            --sidebar-bg: #f9f9f9;
            --text-dark: #333333;
            --border-color: #e0e0e0;
            --sidebar-width: 250px;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.3rem;
        }

        .sidebar a {
            text-decoration: none;
            color: var(--text-dark);
            padding: 15px 25px;
            font-weight: bold;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            background-color: #eeeeee;
            border-left-color: var(--primary-color);
            color: var(--primary-color);
        }

        .logout {
            margin-top: auto;
            margin-bottom: 20px;
            color: #d9534f !important;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        .header button {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .header button:hover {
            opacity: 0.9;
        }

        .inventory-panel {
            background: #ffffff;
            padding: 20px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .delete-btn {
            background: #d9534f;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn:hover {
            opacity: 0.9;
        }

        .loading-text {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Farmer Panel</h2>
        <a href="dashboard.html">Dashboard Overview</a>
        <a href="my-produce.html" class="active">My Produce</a>
        <a href="orders.html">Orders &amp; Sales</a>
        <a href="../index.html" class="logout">Log Out</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>My Active Listings</h1>
            <a href="add-produce.html"><button>+ Add New Produce</button></a>
        </div>

        <div class="inventory-panel" id="inventory-container">
            <p class="loading-text">Loading your inventory...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const farmerName = localStorage.getItem('currentFarmer');
            if (!farmerName) {
                alert('Please log in from the Dashboard first.');
                window.location.href = 'dashboard.html';
                return;
            }
            fetchInventory(farmerName);
        });

        async function fetchInventory(farmerName) {
            try {
                const response = await fetch(`http://localhost:5000/api/farmer/produce/${farmerName}`);
                const produce = await response.json();

                if (!response.ok) {
                    document.getElementById('inventory-container').innerHTML = `<p class="loading-text">${produce.error || 'Failed to load inventory.'}</p>`;
                    return;
                }

                if (produce.length === 0) {
                    document.getElementById('inventory-container').innerHTML = '<p class="loading-text">You have no active listings.</p>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Date Listed</th>
                                <th>Produce Name</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                produce.forEach(p => {
                    html += `
                        <tr>
                            <td>${p.date}</td>
                            <td>${p.name}</td>
                            <td>KSh ${p.price} / ${p.unit}</td>
                            <td>${p.stock} ${p.unit}</td>
                            <td><button class="delete-btn" onclick="deleteProduce(${p.id})">Delete</button></td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                `;

                document.getElementById('inventory-container').innerHTML = html;
            } catch (error) {
                console.error(error);
                document.getElementById('inventory-container').innerHTML = '<p class="loading-text">Could not connect to the server.</p>';
            }
        }

        async function deleteProduce(id) {
            if (!confirm('Are you sure you want to delete this listing?')) return;
            try {
                await fetch(`http://localhost:5000/api/produce/${id}`, { method: 'DELETE' });
                fetchInventory(localStorage.getItem('currentFarmer'));
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>

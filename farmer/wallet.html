<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Wallet | Mkulima Direct</title>
    <style>
        :root {
            --primary-color: #2E8B57;
            --bg-color: #ffffff;
            --sidebar-bg: #f9f9f9;
            --text-dark: #333333;
            --border-color: #e0e0e0;
            --sidebar-width: 250px;
        }

        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background-color: var(--bg-color); color: var(--text-dark); display: flex; height: 100vh; }

        .sidebar { width: var(--sidebar-width); background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding-top: 20px; }
        .sidebar h2 { text-align: center; color: var(--primary-color); margin-bottom: 30px; font-size: 1.3rem; }
        .sidebar a { text-decoration: none; color: var(--text-dark); padding: 15px 25px; font-weight: bold; border-left: 4px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background-color: #eeeeee; border-left-color: var(--primary-color); color: var(--primary-color); }
        .sidebar a.support-link { color: var(--primary-color); background-color: #edf8f2; border-left-color: var(--primary-color); margin-top: auto; }
        .logout { color: #d9534f !important; margin-bottom: 20px; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .card-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { border: 1px solid var(--border-color); padding: 20px; border-radius: 4px; }
        .card label { font-size: 0.8rem; text-transform: uppercase; color: #666; }
        .card .value { font-size: 1.5rem; font-weight: bold; margin-top: 10px; color: var(--primary-color); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); text-align: left; }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid var(--border-color); }
        button { background: var(--primary-color); color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Farmer Panel</h2>
        <a href="dashboard.html">Dashboard Overview</a>
        <a href="my-produce.html">My Produce</a>
        <a href="orders.html">Orders & Sales</a>
        <a href="wallet.html" class="active">My Wallet</a>
        <a href="../index.html" class="logout">Log Out</a>
    </div>

    <div class="main-content">
        <h1>My Wallet</h1>
        <div class="card-container">
            <div class="card"><label>Balance</label><div id="balance-value" class="value">KSh 0.00</div></div>
            <div class="card"><label>Withdrawals</label><div id="withdrawals-value" class="value">KSh 0.00</div></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            <div class="card">
                <h3>Withdraw</h3>
                <input id="phoneNumber" placeholder="Phone (2547XXXXXXXX)">
                <input id="amount" type="number" placeholder="Amount">
                <button id="withdraw-btn">Request</button>
            </div>
            <div class="card">
                <h3>Transaction History</h3>
                <table>
                    <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead>
                    <tbody id="tx-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        function getAuthHeaders() {
            const token = localStorage.getItem('sessionToken');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function handleLogoutClick(event) {
            event.preventDefault();
            const redirectTo = event.currentTarget.getAttribute('href') || '../index.html';
            const userName = localStorage.getItem('currentUserName') || localStorage.getItem('currentFarmer') || '';

            try {
                if (userName) {
                    await fetch('http://localhost:5000/api/auth/logout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userName })
                    });
                }
            } catch (error) {
                console.warn('Logout audit update failed:', error);
            } finally {
                localStorage.removeItem('sessionToken');
                localStorage.removeItem('currentFarmer');
                localStorage.removeItem('currentBuyer');
                localStorage.removeItem('currentRole');
                localStorage.removeItem('currentUserName');
                localStorage.removeItem('isAdmin');
                window.location.href = redirectTo;
            }
        }

        function formatMoney(value) {
            const numeric = Number(value || 0);
            return `KSh ${numeric.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        function escapeHtml(text) {
            return String(text ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderTransactions(transactions) {
            const body = document.getElementById('tx-body');
            if (!Array.isArray(transactions) || transactions.length === 0) {
                body.innerHTML = '<tr><td colspan="4">No transactions yet.</td></tr>';
                return;
            }

            body.innerHTML = transactions.map((tx) => {
                const amount = Number(tx.amount || 0);
                return `
                    <tr>
                        <td>${escapeHtml(tx.date || '-')}</td>
                        <td>${escapeHtml(tx.type || '-')}</td>
                        <td>${formatMoney(amount)}</td>
                        <td>${escapeHtml(tx.status || '-')}</td>
                    </tr>
                `;
            }).join('');
        }

        function summarize(transactions) {
            let withdrawals = 0;

            (transactions || []).forEach((tx) => {
                const type = String(tx.type || '').toLowerCase();
                const amount = Number(tx.amount || 0);

                if (type === 'debit' || type === 'withdrawal') {
                    withdrawals += amount;
                }
            });

            document.getElementById('withdrawals-value').textContent = formatMoney(withdrawals);
        }

        async function loadWallet() {
            const farmerName = localStorage.getItem('currentFarmer');
            const token = localStorage.getItem('sessionToken');

            if (!farmerName || !token) {
                alert('Please log in to view your wallet.');
                window.location.href = '../auth/login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/farmer/wallet/${encodeURIComponent(farmerName)}`, {
                    headers: getAuthHeaders()
                });
                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || 'Failed to load wallet data.');
                    return;
                }

                document.getElementById('balance-value').textContent = formatMoney(data.balance || 0);
                summarize(data.transactions || []);
                renderTransactions(data.transactions || []);
            } catch (error) {
                console.error('Wallet load error:', error);
                alert('Could not connect to the server.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const logoutLink = document.querySelector('.logout');
            if (logoutLink) {
                logoutLink.addEventListener('click', handleLogoutClick);
            }
            loadWallet();
        });
    </script>
    </body>
</html>

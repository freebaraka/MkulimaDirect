<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Produce | Mkulima Direct</title>
    <style>
        :root {
            --primary-color: #2E8B57; 
            --bg-color: #f9f9f9;
            --text-dark: #333333;
            --text-light: #ffffff;
            --border-color: #ccc;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background: var(--text-light);
            padding: 40px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            width: 100%;
            max-width: 500px;
        }

        h2 { color: var(--primary-color); margin-top: 0; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .row {
            display: flex;
            gap: 15px;
        }
        .row > div { flex: 1; }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
        }

        button:hover { opacity: 0.9; }

        .links { margin-top: 20px; text-align: center; font-size: 0.9rem; }
        .links a { color: var(--primary-color); text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        
        #status-message {
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>List New Produce</h2>
        <p>Add your fresh crops to the marketplace.</p>
        
        <form id="produceForm">
            <label>Your Registered Name (To verify account)</label>
            <input type="text" id="farmerName" placeholder="e.g. John Doe" required>

            <label>Produce Name</label>
            <input type="text" id="name" placeholder="e.g. Fresh Sukuma Wiki" required>

            <label>Category</label>
            <select id="category" required>
                <option value="" disabled selected>Select category...</option>
                <option value="Vegetables">Vegetables</option>
                <option value="Fruits">Fruits</option>
                <option value="Grains">Grains & Cereals</option>
                <option value="Livestock">Livestock Products</option>
            </select>

            <div class="row">
                <div>
                    <label>Price (KSh)</label>
                    <input type="number" id="price" placeholder="e.g. 150" required>
                </div>
                <div>
                    <label>Unit Type</label>
                    <select id="unit" required>
                        <option value="Kg">Per Kg</option>
                        <option value="Sack">Per Sack</option>
                        <option value="Bunch">Per Bunch</option>
                        <option value="Piece">Per Piece</option>
                    </select>
                </div>
            </div>

            <label>Quantity Available</label>
            <input type="number" id="quantity" min="0.01" step="0.01" placeholder="e.g. 50" required>

            <label>Short Description</label>
            <textarea id="description" rows="3" placeholder="Describe the quality, freshness, etc."></textarea>
            
            <button type="submit">List Produce</button>
        </form>

        <div id="status-message"></div>

        <div class="links">
            <p><a href="dashboard.html">← Cancel and return to Dashboard</a></p>
        </div>
    </div>

    <script>
        const produceForm = document.getElementById('produceForm');
        const statusMessage = document.getElementById('status-message');

        function getAuthHeaders(includeJson = false) {
            const token = localStorage.getItem('sessionToken');
            const headers = {};
            if (includeJson) {
                headers['Content-Type'] = 'application/json';
            }
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            return headers;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const farmerName = localStorage.getItem('currentFarmer') || '';
            const token = localStorage.getItem('sessionToken');
            if (!token || !farmerName) {
                alert('Please log in to add produce.');
                window.location.href = '../auth/login.html';
                return;
            }
            const farmerNameInput = document.getElementById('farmerName');
            if (farmerNameInput) {
                farmerNameInput.value = farmerName;
            }
        });

        produceForm.addEventListener('submit', async function(event) {
            event.preventDefault(); 

            const produceData = {
                farmerName: document.getElementById('farmerName').value,
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                unit: document.getElementById('unit').value,
                quantity: document.getElementById('quantity').value,
                description: document.getElementById('description').value
            };

            statusMessage.style.display = 'block';
            statusMessage.className = '';
            statusMessage.textContent = 'Listing produce on the market...';

            try {
                const response = await fetch('http://localhost:5000/api/produce', {
                    method: 'POST',
                    headers: getAuthHeaders(true),
                    body: JSON.stringify(produceData)
                });

                const result = await response.json();

                if (response.ok) {
                    statusMessage.className = 'success';
                    statusMessage.textContent = 'Success! Redirecting back to dashboard...';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    statusMessage.className = 'error';
                    statusMessage.textContent = result.error || 'Failed to add produce.';
                }
            } catch (error) {
                console.error('Error:', error);
                statusMessage.className = 'error';
                statusMessage.textContent = 'Cannot connect to the server.';
            }
        });
    </script>

</body>
</html>
